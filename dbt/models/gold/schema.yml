version: 2

models:
  - name: fact_stock_indicators
    description: "OHLCV indicators: MA50/MA200/RSI14/MACD/Bollinger. Full rebuild table."
    columns:
      - name: rsi_14
        description: "RSI14 Wilder. NULL trong 14 ngày đầu mỗi mã."
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "rsi_14 >= 0 AND rsi_14 <= 100"
          config:
            where: "rsi_14 IS NOT NULL"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "ma200 > 0"
          config:
            where: "ma200 IS NOT NULL"

      - dbt_utils.expression_is_true:
          arguments:
            expression: "bb_upper >= bb_lower"
          config:
            where: "bb_upper IS NOT NULL AND bb_lower IS NOT NULL"

  - name: fact_market_summary
    description: "Daily market summary showing gainers, losers, and index performance."
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "gainers + losers + unchanged = total_symbols"

  - name: dim_stock
    description: "Dimension table for distinct symbols."
    columns:
      - name: symbol
        tests:
          - unique
          - not_null
