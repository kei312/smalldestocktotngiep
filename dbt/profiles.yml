stock_profile:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DB_HOST', 'localhost') }}"
      user: "{{ env_var('DB_USER', 'airflow') }}"
      password: "{{ env_var('DB_PASS', 'airflow') }}"
      port: 5432
      dbname: "{{ env_var('DB_NAME', 'stock_db') }}"
      schema: public
      threads: 4
