services:
  db:
    container_name: postgres-container
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-airflow}
      POSTGRES_PASSWORD: ${DB_PASS:-airflow}
      POSTGRES_DB: ${DB_NAME:-stock_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - stock-network

  airflow:
    container_name: airflow-container
    image: apache/airflow:3.2.2
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER:-airflow}:${DB_PASS:-airflow}@db:5432/${DB_NAME:-stock_db}
      _PIP_ADDITIONAL_REQUIREMENTS: vnstock requests pandas psycopg2-binary
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      - db
    networks:
      - stock-network
    command: standalone

networks:
  stock-network:
    driver: bridge

volumes:
  pgdata:
